services:
  postgres:
    image: postgres:16-alpine
    container_name: findmyvibe-postgres
    environment:
      POSTGRES_DB: findmyvibe
      POSTGRES_USER: findmyvibe
      POSTGRES_PASSWORD: findmyvibe
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: findmyvibe-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
